<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A00DF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="p-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A00DF"/>
      <stop offset="100%" stop-color="#4F23CC"/>
    </linearGradient>
  </defs>

  <!-- House roof -->
  <path d="M40 10L10 34H70L40 10Z" fill="url(#ai-grad)" opacity="0.9"/>

  <!-- House body -->
  <rect x="14" y="34" width="52" height="38" rx="3" fill="url(#p-grad)"/>

  <!-- AI Circuit nodes -->
  <circle cx="30" cy="48" r="4.5" fill="white" opacity="0.95"/>
  <circle cx="50" cy="48" r="4.5" fill="white" opacity="0.95"/>
  <circle cx="40" cy="60" r="4.5" fill="white" opacity="0.95"/>

  <!-- Circuit connections -->
  <line x1="30" y1="48" x2="50" y2="48" stroke="white" stroke-width="2" opacity="0.45"/>
  <line x1="30" y1="48" x2="40" y2="60" stroke="white" stroke-width="2" opacity="0.45"/>
  <line x1="50" y1="48" x2="40" y2="60" stroke="white" stroke-width="2" opacity="0.45"/>

  <!-- Central AI node -->
  <circle cx="40" cy="48" r="2" fill="#06B6D4"/>
  <circle cx="35" cy="54" r="2" fill="#06B6D4" opacity="0.5"/>
  <circle cx="45" cy="54" r="2" fill="#06B6D4" opacity="0.5"/>
</svg>
